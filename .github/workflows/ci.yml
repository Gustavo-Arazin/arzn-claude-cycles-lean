name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) instala Lean/Lake (não compila nada aqui)
      - name: Setup Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: false

      # 2) gera o lake-manifest.json (fix do erro)
      - name: lake update
        run: |
          cd ClaudeCyclesARZN_Lean_M0
          lake update

      # 3) (recomendado) pega cache de oleans do mathlib para acelerar
      - name: mathlib cache
        run: |
          cd ClaudeCyclesARZN_Lean_M0
          lake exe cache get

      # 4) compila
      - name: lake build
        run: |
          cd ClaudeCyclesARZN_Lean_M0
          lake build
