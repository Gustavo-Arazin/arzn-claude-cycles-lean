name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (Lean + Lake)
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: "ClaudeCyclesARZN_Lean_M0"
          use-github-cache: true
          auto-config: true
